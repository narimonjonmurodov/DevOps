urls=("/" "/index.html" "/login" "/signup" "/api/data" "/about" "/contact")
agents=("Mozilla" "Google Chrome" "Opera" "Safari" "Internet Explorer" "Microsoft Edge" "Crawler and bot" "Library and net tool")
methods=("GET" "POST" "PUT" "PATCH" "DELETE")
codes=(200 201 400 401 403 404 500 501 502 503)

# HTTP Response Codes Meaning
# 200 - OK (request was successful)
# 201 - Created (resource successfully created)
# 400 - Bad Request (server cannot understand request)
# 401 - Unauthorized (authentication required)
# 403 - Forbidden (server refuses access)
# 404 - Not Found (requested resource does not exist)
# 500 - Internal Server Error (server failed internally)
# 501 - Not Implemented (server does not support request method)
# 502 - Bad Gateway (invalid response from upstream server)
# 503 - Service Unavailable (server temporarily unavailable)

